server {
    listen 80;
    server_name gdpx.ru;

    # Редирект всех HTTP запросов на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }

    # Эндпоинт для проверки Certbot (Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
}

server {
    listen 443 ssl;
    server_name gdpx.ru;

    # Эти пути будут созданы Certbot'ом автоматически после выполнения команд
    ssl_certificate /etc/letsencrypt/live/gdpx.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gdpx.ru/privkey.pem;

    # Оптимизация SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Логи доступа
    access_log /var/log/nginx/gdpx_access.log;
    error_log /var/log/nginx/gdpx_error.log;

    # Проксирование всех запросов к боту (Webhook, WebApp, API)
    location / {
        proxy_pass http://127.0.0.1:8167;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Тайм-ауты для длинных соединений
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Защита от больших файлов (если бот их не принимает)
    client_max_body_size 20M;
}
