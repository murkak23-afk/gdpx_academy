{% extends "base.html" %}

{% block title %}GDPX // ВХОД{% endblock %}

{% block content %}
<div class="fixed inset-0 bg-[#0a0a0f] flex flex-col justify-center items-center p-4 z-[100]">
    
    <!-- Параллакс-фон внутри логина для атмосферы -->
    <div class="absolute inset-0 pointer-events-none opacity-40">
        <div class="stars"></div>
        <div class="parallax-layer layer-bg"></div>
    </div>

    <!-- Карточка логина (Glassmorphism Dark) -->
    <div class="relative w-full max-w-[420px] bg-[#0a0a0f]/80 backdrop-blur-2xl p-10 rounded-[32px] border border-white/10 shadow-[0_20px_50px_rgba(0,0,0,0.8)] animate-in slide-in-from-bottom-4 duration-700 ease-out">
        
        <!-- Заголовок -->
        <div class="text-center mb-10">
            <img src="/assets/logo.png" class="w-32 h-auto mx-auto mb-8 drop-shadow-[0_0_15px_rgba(0,217,255,0.5)]" alt="GDPX Logo">
            <h2 class="text-[14px] font-bold text-nexus-cyan tracking-[0.3em] uppercase drop-shadow-[0_0_10px_rgba(0,217,255,0.8)]">Академия GDPX / УПРАВЛЕНИЕ</h2>
            <p class="text-white/40 text-[12px] mt-4 tracking-widest uppercase">Авторизация в Nexus Control</p>
        </div>

        <!-- Форма -->
        <form hx-post="/auth/login" 
              hx-target="#error-container" 
              class="flex flex-col gap-6">
            
            <!-- Поле: Логин -->
            <div class="flex flex-col gap-2">
                <div class="relative group">
                    <input type="text" name="login" required
                           class="w-full bg-white/5 border border-white/10 rounded-[16px] px-6 py-4 outline-none focus:border-nexus-cyan/50 focus:ring-1 focus:ring-nexus-cyan/20 transition-all text-white font-medium placeholder:text-white/20"
                           placeholder="ЛОГИН">
                </div>
            </div>

            <!-- Поле: Пароль -->
            <div class="flex flex-col gap-2" x-data="{ show: false }">
                <div class="relative group">
                    <input :type="show ? 'text' : 'password'" name="password" required
                           class="w-full bg-white/5 border border-white/10 rounded-[16px] px-6 py-4 outline-none focus:border-nexus-cyan/50 focus:ring-1 focus:ring-nexus-cyan/20 transition-all text-white font-medium placeholder:text-white/20"
                           placeholder="ПАРОЛЬ">
                    <button type="button" @click="show = !show" 
                            class="absolute inset-y-0 right-0 pr-6 flex items-center text-white/20 hover:text-nexus-cyan transition-colors">
                        <svg x-show="!show" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                        <svg x-show="show" x-cloak class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.05 0 011.563-3.074m9.448-4.854A10 10 0 0112 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-1.274 0-2.454-.21-3.54-.592M9.75 9.75l4.5 4.5m-4.5 0l4.5-4.5M3 3l18 18" /></svg>
                    </button>
                </div>
            </div>

            <div id="error-container"></div>

            <!-- Кнопка -->
            <button type="submit" 
                    class="w-full h-[58px] rounded-[18px] font-bold text-white text-[14px] tracking-[0.3em] uppercase
                           bg-gradient-to-r from-nexus-cyan to-nexus-sakura 
                           hover:shadow-[0_0_40px_rgba(0,212,255,0.4)] hover:-translate-y-0.5 active:scale-[0.98] transition-all duration-300">
                ВОЙТИ В NEXUS
            </button>
        </form>
    </div>
</div>

<style>
    aside, header { display: none !important; }
    main { padding: 0 !important; }
</style>
{% endblock %}
