{% extends "base.html" %}

{% block title %}GDPX // AUTHORIZATION{% endblock %}

{% block content %}
<div class="fixed inset-0 bg-[#050508] flex flex-col justify-center items-center p-4 z-[100] overflow-hidden text-center">
    
    <!-- ВЕЛИЧЕСТВЕННЫЙ ЯПОНСКИЙ ФОН (Теневые силуэты) -->
    <div class="absolute inset-0 z-0 pointer-events-none select-none">
        <!-- Глубокое свечение -->
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_40%,#1e1b4b,transparent)] opacity-60"></div>
        
        <!-- Гора Фудзи (Центральный массивный силуэт) -->
        <svg class="absolute bottom-0 left-1/2 -translate-x-1/2 w-[120%] h-auto opacity-[0.04] text-white" viewBox="0 0 1000 400" fill="currentColor">
            <path d="M500 50 L850 400 L150 400 Z" />
            <path d="M500 50 L580 130 L420 130 Z" class="opacity-20" /> <!-- Снежная шапка -->
        </svg>

        <!-- Пагода (Детальный силуэт слева) -->
        <svg class="absolute bottom-0 left-[5%] w-[300px] md:w-[450px] h-auto opacity-[0.03] text-white" viewBox="0 0 200 400" fill="currentColor">
            <rect x="80" y="300" width="40" height="100" />
            <path d="M60 300 L140 300 L100 270 Z" />
            <rect x="85" y="240" width="30" height="60" />
            <path d="M65 240 L135 240 L100 210 Z" />
            <rect x="90" y="190" width="20" height="50" />
            <path d="M70 190 L130 190 L100 165 Z" />
            <path d="M98 100 L102 100 L100 165 Z" /> <!-- Шпиль -->
        </svg>

        <!-- Ветка Сакуры (Сверху справа) -->
        <svg class="absolute top-0 right-0 w-[400px] md:w-[600px] h-auto opacity-[0.05] text-white flip-x" viewBox="0 0 300 200" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M300 20 Q 200 50 150 120 T 50 180" />
            <path d="M220 45 Q 180 20 140 40" />
            <path d="M160 105 Q 120 80 80 110" />
            <!-- Лепестки -->
            <circle cx="150" cy="120" r="3" fill="#ff00ea" stroke="none" />
            <circle cx="140" cy="40" r="2" fill="#ff00ea" stroke="none" />
            <circle cx="80" cy="110" r="4" fill="#ff00ea" stroke="none" />
            <circle cx="50" cy="180" r="3" fill="#ff00ea" stroke="none" />
        </svg>

        <!-- Силуэт Катаны (Тонкая линия через фон) -->
        <div class="absolute top-1/2 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-white/5 to-transparent -rotate-[15deg]"></div>
    </div>

    <!-- КОНТЕЙНЕР КАРТОЧКИ -->
    <div class="relative z-10 w-full max-w-[400px] animate-in fade-in slide-in-from-bottom-8 duration-1000 ease-out">
        
        <!-- Карточка Glassmorphism -->
        <div class="bg-white/[0.01] backdrop-blur-[40px] p-8 sm:p-10 rounded-[40px] border border-white/10 shadow-[0_40px_120px_rgba(0,0,0,0.9)] relative overflow-hidden group text-center">
            
            <div class="absolute inset-0 bg-gradient-to-br from-nexus-cyan/[0.03] to-nexus-sakura/[0.03] opacity-50"></div>

            <!-- ЛОГОТИП И ЗАГОЛОВОК (КОМПАКТНЫЕ) -->
            <div class="text-center mb-8 relative">
                <div class="relative inline-block mb-6 animate-bounce" style="animation-duration: 5s;">
                    <div class="absolute inset-0 bg-nexus-cyan blur-[40px] opacity-20 rounded-full"></div>
                    <img src="/assets/logo.png" class="w-40 h-auto relative z-10 drop-shadow-[0_0_20px_rgba(0,217,255,0.5)]" alt="GDPX">
                    <div class="hidden w-28 h-24 mx-auto rounded-full bg-gradient-to-br from-nexus-cyan to-nexus-sakura p-1 relative z-10 shadow-[0_0_40px_rgba(0,217,255,0.3)]">
                        <div class="w-full h-full bg-[#0a0a0f] rounded-full flex items-center justify-center">
                            <span class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-nexus-cyan to-white tracking-widest">GDPX</span>
                        </div>
                    </div>
                </div>

                <h2 class="text-[18px] sm:text-[20px] font-bold text-white tracking-[0.4em] uppercase drop-shadow-[0_0_10px_rgba(255,255,255,0.3)]">Академия GDPX</h2>
                <div class="h-[1px] w-16 bg-gradient-to-r from-transparent via-white/30 to-transparent mx-auto my-4"></div>
                <p class="text-nexus-cyan text-[9px] sm:text-[10px] tracking-[0.5em] uppercase font-black drop-shadow-[0_0_8px_rgba(0,217,255,0.6)]">Access Restricted</p>
            </div>

            <!-- ФОРМА -->
            <form hx-post="/auth/login" hx-target="#error-container" class="flex flex-col gap-5 relative z-10">
                
                <div class="relative group/input">
                    <div class="absolute -inset-0.5 bg-gradient-to-r from-nexus-cyan to-nexus-sakura rounded-[18px] opacity-0 group-hover/input:opacity-30 transition duration-500 blur-sm"></div>
                    <input type="text" name="login" required autocomplete="off"
                           class="relative w-full bg-black/40 border border-white/10 rounded-[16px] px-6 py-4 outline-none focus:border-nexus-cyan focus:bg-white/[0.05] text-white placeholder:text-white/10 font-medium tracking-widest text-[13px] transition-all duration-300" 
                           placeholder="USERNAME / ID">
                </div>

                <div class="relative group/input">
                    <div class="absolute -inset-0.5 bg-gradient-to-r from-nexus-cyan to-nexus-sakura rounded-[18px] opacity-0 group-hover/input:opacity-30 transition duration-500 blur-sm"></div>
                    <input type="password" name="password" required 
                           class="relative w-full bg-black/40 border border-white/10 rounded-[16px] px-6 py-4 outline-none focus:border-nexus-sakura focus:bg-white/[0.05] text-white placeholder:text-white/10 font-medium tracking-widest text-[13px] transition-all duration-300" 
                           placeholder="PASSWORD">
                </div>

                <div id="error-container" class="min-h-[20px]"></div>
                
                <button type="submit" onclick="this.innerHTML='<span class=\'animate-pulse\'>AUTHENTICATING...</span>';"
                        class="relative w-full h-[56px] mt-1 rounded-[16px] font-black text-white text-[13px] tracking-[0.3em] uppercase bg-gradient-to-r from-nexus-cyan to-nexus-sakura overflow-hidden group/btn shadow-[0_0_30px_rgba(255,0,234,0.3)] hover:shadow-[0_0_50px_rgba(0,217,255,0.5)] transition-all duration-700 hover:-translate-y-1 active:scale-[0.98]">
                    
                    <div class="absolute top-0 -inset-full h-full w-1/2 z-5 block transform -skew-x-12 bg-gradient-to-r from-transparent to-white opacity-20 group-hover/btn:animate-[shine_2s_ease-in-out_infinite]"></div>
                    
                    <span class="relative z-10">ВОЙТИ В СИСТЕМУ</span>
                </button>
            </form>

            <!-- Техническая подпись -->
            <div class="mt-12 pointer-events-none opacity-20">
                <p class="text-[9px] font-mono tracking-[0.5em] text-white">NEXUS CORE V2.0 // JAPANESE MINIMALISM EDITION</p>
            </div>
        </div>
    </div>
</div>

<style>
    /* Скрываем только боковую панель и мобильную шапку */
    aside, header, .fixed.inset-0#hero { display: none !important; }
    
    /* Делаем main невидимым контейнером на весь экран */
    main { 
        padding: 0 !important; 
        margin: 0 !important; 
        width: 100vw !important; 
        height: 100vh !important; 
        display: flex !important; 
        align-items: center; 
        justify-content: center;
        background: transparent !important;
    }
    .flip-x { transform: scaleX(-1); }
    
    @keyframes shine {
        0% { left: -100%; }
        100% { left: 200%; }
    }
</style>
{% endblock %}
