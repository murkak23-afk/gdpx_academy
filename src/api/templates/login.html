{% extends "base.html" %}

{% block title %}GDPX // AUTHORIZATION{% endblock %}

{% block content %}
<div class="fixed inset-0 bg-[#0a0a0f] flex flex-col justify-center items-center p-4 z-[100]">
    
    <!-- Stars Background -->
    <div class="absolute inset-0 pointer-events-none opacity-40">
        <div class="stars"></div>
        <div class="parallax-layer layer-bg"></div>
    </div>

    <!-- Login Card -->
    <div class="relative w-full max-w-[420px] bg-[#0a0a0f]/80 backdrop-blur-2xl p-10 rounded-[32px] border border-white/10 shadow-[0_20px_50px_rgba(0,0,0,0.8)] animate-in slide-in-from-bottom-4 duration-700 ease-out">
        
        <div class="text-center mb-10">
            <img src="/assets/logo.png" class="w-32 h-auto mx-auto mb-8 drop-shadow-[0_0_20px_rgba(0,212,255,0.3)]" alt="GDPX Logo">
            <h2 class="text-[16px] font-bold text-white tracking-[0.3em] uppercase drop-shadow-[0_0_10px_rgba(255,255,255,0.2)]">Академия GDPX / УПРАВЛЕНИЕ</h2>
            <p class="text-nexus-cyan text-[10px] mt-4 tracking-[0.4em] uppercase font-bold opacity-80">Access Restricted</p>
        </div>

        <form hx-post="/auth/login" hx-target="#error-container" class="flex flex-col gap-6">
            <input type="text" name="login" required class="w-full bg-white/5 border border-white/10 rounded-[16px] px-6 py-4 outline-none focus:border-nexus-cyan/50 text-white placeholder:text-white/20 uppercase tracking-widest text-xs" placeholder="ЛОГИН">
            <input type="password" name="password" required class="w-full bg-white/5 border border-white/10 rounded-[16px] px-6 py-4 outline-none focus:border-nexus-cyan/50 text-white placeholder:text-white/20 uppercase tracking-widest text-xs" placeholder="ПАРОЛЬ">
            <div id="error-container"></div>
            <button type="submit" class="w-full h-[58px] rounded-[18px] font-bold text-white text-[14px] tracking-[0.3em] uppercase bg-gradient-to-r from-nexus-cyan to-nexus-sakura hover:shadow-[0_0_40px_rgba(0,212,255,0.4)] transition-all active:scale-95">ВОЙТИ В СИСТЕМУ</button>
        </form>
    </div>
</div>

<style>
    /* Полностью зачищаем любые всплывающие логотипы и меню на странице входа */
    aside, header, .fixed.top-8.right-8 { display: none !important; }
    main { padding: 0 !important; }
</style>
{% endblock %}
