{% extends "base.html" %}

{% block title %}GDPX // AUTHORIZATION{% endblock %}

{% block content %}
<div class="fixed inset-0 bg-[#050508] flex flex-col justify-center items-center p-4 z-[100] overflow-hidden">
    
    <!-- Атмосферный фон (Градиенты) -->
    <div class="absolute inset-0 z-0 pointer-events-none select-none">
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_40%,#1e1b4b,transparent)] opacity-60"></div>
        <div class="absolute top-0 left-0 w-full h-full bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] opacity-20"></div>
    </div>

    <!-- Основной контейнер (Modern Premium) -->
    <div class="relative z-10 w-full max-w-[440px] fade-in">
        
        <div class="premium-card p-10 sm:p-14 text-center group">
            
            <div class="mb-12 relative">
                <!-- Декоративное свечение за логотипом -->
                <div class="absolute inset-0 bg-gdpx-cyan/20 blur-[60px] rounded-full scale-0 group-hover:scale-100 transition-transform duration-1000"></div>
                
                <img src="/assets/logoteep.png" class="logo-evolution-hero w-56 h-auto mx-auto relative z-10" alt="GDPX">
                <h2 class="text-[32px] font-black text-white mt-10 tracking-tighter japanese-title neon-text-gradient">Вход в систему</h2>
                <div class="flex items-center justify-center gap-2 mt-2">
                    <span class="w-8 h-[1px] bg-white/10"></span>
                    <p class="text-white/30 text-[9px] uppercase tracking-[0.4em]">Protocol Activated</p>
                    <span class="w-8 h-[1px] bg-white/10"></span>
                </div>
            </div>

            <!-- ФОРМА -->
            <form action="/auth/login" method="POST"  class="flex flex-col gap-6">
                
                <div class="space-y-3 text-left">
                    <label class="text-[9px] font-black text-white/20 uppercase tracking-[0.3em] ml-6">Access Identity</label>
                    <div class="relative group/input">
                        <input type="text" name="login" required autocomplete="off"
                               class="w-full bg-white/[0.02] border border-white/5 rounded-2xl px-8 py-5 outline-none focus:border-gdpx-cyan/50 focus:bg-white/[0.04] text-white placeholder:text-white/5 transition-all" 
                               placeholder="USERNAME / ID">
                        <div class="absolute inset-0 border border-gdpx-cyan/0 rounded-2xl group-hover/input:border-white/10 pointer-events-none transition-all"></div>
                    </div>
                </div>

                <div class="space-y-3 text-left">
                    <label class="text-[9px] font-black text-white/20 uppercase tracking-[0.3em] ml-6">Security Cipher</label>
                    <div class="relative group/input">
                        <input type="password" name="password" required 
                               class="w-full bg-white/[0.02] border border-white/5 rounded-2xl px-8 py-5 outline-none focus:border-gdpx-sakura/50 focus:bg-white/[0.04] text-white placeholder:text-white/5 transition-all" 
                               placeholder="••••••••">
                        <div class="absolute inset-0 border border-gdpx-sakura/0 rounded-2xl group-hover/input:border-white/10 pointer-events-none transition-all"></div>
                    </div>
                </div>

                <div id="error-container" class="min-h-[20px]"></div>
                
                <button type="submit" 
                        class="w-full h-[64px] rounded-2xl font-black text-white text-[13px] tracking-[0.3em] uppercase bg-white/5 border border-white/10 hover:bg-gdpx-cyan hover:text-black hover:border-gdpx-cyan shadow-2xl transition-all active:scale-[0.97] mt-4">
                    Авторизоваться
                </button>
            </form>

            <div class="mt-10 opacity-20">
                <p class="text-[9px] font-mono tracking-widest text-white uppercase">NXS.OS v3.0 // HIGH-END OPERATIONAL CORE</p>
            </div>
        </div>
    </div>
</div>

<style>
    /* Скрываем интерфейс дашборда на странице логина */
    aside, header, .cyber-ticker { display: none !important; }
    main { padding: 0 !important; margin: 0 !important; width: 100vw !important; height: 100vh !important; display: flex !important; align-items: center; justify-content: center; background: transparent !important; }
</style>
{% endblock %}
