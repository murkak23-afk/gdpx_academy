{% extends "base.html" %}

{% block title %}GDPX // AUTHORIZATION{% endblock %}

{% block content %}
<div class="fixed inset-0 bg-[#050508] flex flex-col justify-center items-center p-4 z-[100] overflow-hidden text-center">
    
    <!-- ВЕЛИЧЕСТВЕННЫЙ ЯПОНСКИЙ ФОН (Теневые силуэты) -->
    <div class="absolute inset-0 z-0 pointer-events-none select-none">
        <!-- Глубокое свечение -->
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_40%,#1e1b4b,transparent)] opacity-60"></div>
        
        <!-- Гора Фудзи (Центральный массивный силуэт) -->
        <svg class="absolute bottom-0 left-1/2 -translate-x-1/2 w-[120%] h-auto opacity-[0.04] text-white" viewBox="0 0 1000 400" fill="currentColor">
            <path d="M500 50 L850 400 L150 400 Z" />
            <path d="M500 50 L580 130 L420 130 Z" class="opacity-20" /> <!-- Снежная шапка -->
        </svg>

        <!-- Пагода (Детальный силуэт слева) -->
        <svg class="absolute bottom-0 left-[5%] w-[300px] md:w-[450px] h-auto opacity-[0.03] text-white" viewBox="0 0 200 400" fill="currentColor">
            <rect x="80" y="300" width="40" height="100" />
            <path d="M60 300 L140 300 L100 270 Z" />
            <rect x="85" y="240" width="30" height="60" />
            <path d="M65 240 L135 240 L100 210 Z" />
            <rect x="90" y="190" width="20" height="50" />
            <path d="M70 190 L130 190 L100 165 Z" />
            <path d="M98 100 L102 100 L100 165 Z" /> <!-- Шпиль -->
        </svg>

        <!-- Ветка Сакуры (Сверху справа) -->
        <svg class="absolute top-0 right-0 w-[400px] md:w-[600px] h-auto opacity-[0.05] text-white flip-x" viewBox="0 0 300 200" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M300 20 Q 200 50 150 120 T 50 180" />
            <path d="M220 45 Q 180 20 140 40" />
            <path d="M160 105 Q 120 80 80 110" />
            <!-- Лепестки -->
            <circle cx="150" cy="120" r="3" fill="#ff00ea" stroke="none" />
            <circle cx="140" cy="40" r="2" fill="#ff00ea" stroke="none" />
            <circle cx="80" cy="110" r="4" fill="#ff00ea" stroke="none" />
            <circle cx="50" cy="180" r="3" fill="#ff00ea" stroke="none" />
        </svg>

        <!-- Силуэт Катаны (Тонкая линия через фон) -->
        <div class="absolute top-1/2 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-white/5 to-transparent -rotate-[15deg]"></div>
    </div>

    <!-- КОНТЕЙНЕР АВТОРИЗАЦИИ (Скрыт изначально) -->
    <div id="login-form-container" class="relative z-10 w-full max-w-[400px] hidden opacity-0 transition-all duration-1000">
        <!-- Карточка Glassmorphism -->
        <div class="bg-white/[0.01] backdrop-blur-[40px] p-8 sm:p-10 rounded-[40px] border border-white/10 shadow-[0_40px_120px_rgba(0,0,0,0.9)] relative overflow-hidden group text-center">
            <div class="absolute inset-0 bg-gradient-to-br from-nexus-cyan/[0.03] to-nexus-sakura/[0.03] opacity-50"></div>
            <!-- Мини-логотип -->
            <div class="mb-8 relative">
                <img src="/assets/logo.png" id="small-logo" class="w-32 h-auto mx-auto drop-shadow-[0_0_20px_rgba(0,217,255,0.3)]" alt="GDPX">
            </div>
            <h2 class="text-[20px] font-bold text-white tracking-[0.4em] uppercase mb-8 japanese-title">ACCESS PROTOCOL</h2>
            <!-- ФОРМА -->
            <form hx-post="/auth/login" hx-target="#error-container" class="flex flex-col gap-5 relative z-10">
                <div class="relative group/input">
                    <input type="text" name="login" required autocomplete="off"
                           class="w-full bg-black/40 border border-white/10 rounded-[16px] px-6 py-4 outline-none focus:border-nexus-cyan text-white placeholder:text-white/10 font-medium tracking-widest text-[13px] transition-all" 
                           placeholder="USERNAME / ID">
                </div>
                <div class="relative group/input">
                    <input type="password" name="password" required 
                           class="w-full bg-black/40 border border-white/10 rounded-[16px] px-6 py-4 outline-none focus:border-nexus-sakura text-white placeholder:text-white/10 font-medium tracking-widest text-[13px] transition-all" 
                           placeholder="PASSWORD">
                </div>
                <div id="error-container"></div>
                <button type="submit" class="w-full h-[56px] rounded-[16px] font-black text-white text-[12px] tracking-[0.3em] uppercase bg-gradient-to-r from-nexus-cyan to-nexus-sakura shadow-[0_0_30px_rgba(0,217,255,0.2)] active:scale-95 transition-all">
                    INITIATE LINK
                </button>
            </form>
        </div>
    </div>

    <!-- ЦЕНТРАЛЬНЫЙ ЛОГОТИП (КЛЮЧ) -->
    <div id="intro-key" class="relative z-20 flex flex-col items-center justify-center cursor-pointer transition-all duration-1000">
        <div id="logo-shockwave" class="absolute w-64 h-64 rounded-full border-2 border-nexus-cyan opacity-0 pointer-events-none"></div>
        <div id="big-logo-wrap" class="relative transition-all duration-1000 ease-in-out hover:scale-110">
            <div class="absolute inset-0 bg-nexus-cyan blur-[60px] opacity-20 rounded-full animate-pulse"></div>
            <img src="/assets/logo.png" id="big-logo" class="w-80 h-auto relative z-10 drop-shadow-[0_0_40px_rgba(0,217,255,0.6)]" alt="GDPX">
        </div>
        <p id="entry-text" class="mt-12 text-nexus-cyan text-[10px] tracking-[0.6em] uppercase font-bold animate-pulse">Click to Authenticate</p>
    </div>
</div>

<script>
    const introKey = document.getElementById('intro-key');
    const bigLogoWrap = document.getElementById('big-logo-wrap');
    const shockwave = document.getElementById('logo-shockwave');
    const formContainer = document.getElementById('login-form-container');
    const entryText = document.getElementById('entry-text');

    introKey.onclick = () => {
        playCinematicSound('action');
        
        // 1. Эффект ударной волны
        shockwave.animate([
            { transform: 'scale(1)', opacity: 1 },
            { transform: 'scale(4)', opacity: 0 }
        ], { duration: 800, easing: 'ease-out' });

        // 2. Анимация монетки (Coin Flip) и перемещение
        bigLogoWrap.style.transition = 'all 1.2s cubic-bezier(0.34, 1.56, 0.64, 1)';
        bigLogoWrap.style.transform = 'rotateY(720deg) scale(0.2)';
        entryText.style.opacity = '0';
        
        // Находим позицию маленького логотипа
        const targetLogo = document.getElementById('small-logo');
        const targetRect = targetLogo.getBoundingClientRect();
        const currentRect = bigLogoWrap.getBoundingClientRect();
        
        const deltaX = targetRect.left + (targetRect.width/2) - (currentRect.left + (currentRect.width/2));
        const deltaY = targetRect.top + (targetRect.height/2) - (currentRect.top + (currentRect.height/2));
        
        bigLogoWrap.style.transform += ` translate(${deltaX}px, ${deltaY}px)`;

        // 3. Плавный переход к форме
        setTimeout(() => {
            introKey.style.opacity = '0';
            setTimeout(() => {
                introKey.style.display = 'none';
                formContainer.style.display = 'block';
                setTimeout(() => {
                    formContainer.style.opacity = '1';
                }, 50);
            }, 500);
        }, 800);
    };
</script>

<style>
    #logo-shockwave { transition: none; }
    .japanese-title { font-family: 'Cormorant Garamond', serif; }
    aside, header, .fixed.inset-0#hero { display: none !important; }
    main { padding: 0 !important; margin: 0 !important; width: 100vw !important; height: 100vh !important; display: flex !important; align-items: center; justify-content: center; background: transparent !important; }
</style>
</div>

<style>
    /* Скрываем только боковую панель и мобильную шапку */
    aside, header, .fixed.inset-0#hero { display: none !important; }
    
    /* Делаем main невидимым контейнером на весь экран */
    main { 
        padding: 0 !important; 
        margin: 0 !important; 
        width: 100vw !important; 
        height: 100vh !important; 
        display: flex !important; 
        align-items: center; 
        justify-content: center;
        background: transparent !important;
    }
    .flip-x { transform: scaleX(-1); }
    
    @keyframes shine {
        0% { left: -100%; }
        100% { left: 200%; }
    }
    .animate-rotate-y {
        animation: rotate-y 8s ease-in-out infinite;
    }
    @keyframes rotate-y {
        0%, 100% { transform: rotateY(0deg); }
        50% { transform: rotateY(30deg); }
    }
</style>
{% endblock %}
