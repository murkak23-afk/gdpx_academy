{% extends "base.html" %}

{% block title %}GDPX // AUTHORIZATION{% endblock %}

{% block content %}
<!-- PRELOADER ASSEMBLY CHIP -->
<div id="preloader" class="fixed inset-0 z-[200] bg-[#0a0a0c] flex items-center justify-center transition-opacity duration-1000">
    <div class="w-32 h-32 relative">
        <svg class="w-full h-full" viewBox="0 0 100 100">
            <path class="line-trace" d="M0,0 L40,40 M100,0 L60,40 M0,100 L40,60 M100,100 L60,60" fill="none" />
            <rect class="chip-core" x="40" y="40" width="20" height="20" fill="none" />
        </svg>
    </div>
</div>

<div class="fixed inset-0 flex flex-col justify-center items-center p-4 z-[100] overflow-hidden">
    <!-- Основной контейнер (Sapphire Glass Architecture) -->
    <div class="relative z-10 w-full max-w-[460px] fade-in">
        
        <div class="premium-card p-12 sm:p-16 text-center group">
            
            <div class="mb-14 relative">
                <!-- Эволюция Логотипа (Tokyo Precision) -->
                <div class="relative w-48 h-auto mx-auto group/logo">
                    <img src="/assets/logoteep.png" class="w-full h-auto opacity-20 grayscale transition-all duration-1000 group-hover/logo:opacity-10 group-hover/logo:blur-[4px]" alt="GDPX">
                    <img src="/assets/logoteep1.png" class="absolute inset-0 w-full h-auto opacity-0 scale-95 blur-md transition-all duration-1000 group-hover/logo:opacity-100 group-hover/logo:scale-100 group-hover/logo:blur-0 drop-shadow-[0_0_20px_rgba(255,255,255,0.1)]" alt="GDPX Detailed">
                </div>

                <h2 class="text-[36px] font-extralight text-white mt-12 tracking-[-0.04em] japanese-title steel-text">GDPX ACCESS</h2>
                <div class="flex items-center justify-center gap-4 mt-4">
                    <span class="w-12 h-[1px] bg-white/5"></span>
                    <p class="text-white/20 text-[9px] uppercase tracking-[0.5em] font-medium">Protocol Layer 04</p>
                    <span class="w-12 h-[1px] bg-white/5"></span>
                </div>
            </div>

            <!-- ФОРМА -->
            <form action="/auth/login" method="POST"  class="flex flex-col gap-8">
                
                <div class="space-y-4 text-left">
                    <label class="text-[9px] font-bold text-white/10 uppercase tracking-[0.4em] ml-2">Access Identity</label>
                    <div class="relative group/input">
                        <input type="text" name="login" required autocomplete="off"
                               class="w-full bg-white/[0.01] border border-white/5 rounded-lg px-8 py-5 outline-none focus:border-white/20 focus:bg-white/[0.03] text-white placeholder:text-white/5 transition-all font-light tracking-widest uppercase" 
                               placeholder="USERNAME / ID">
                    </div>
                </div>

                <div class="space-y-4 text-left">
                    <label class="text-[9px] font-bold text-white/10 uppercase tracking-[0.4em] ml-2">Security Cipher</label>
                    <div class="relative group/input">
                        <input type="password" name="password" required 
                               class="w-full bg-white/[0.01] border border-white/5 rounded-lg px-8 py-5 outline-none focus:border-white/20 focus:bg-white/[0.03] text-white placeholder:text-white/5 transition-all" 
                               placeholder="••••••••">
                    </div>
                </div>

                <div id="error-container" class="min-h-[20px]"></div>
                
                <button type="submit" 
                        class="titan-button w-full h-[70px] rounded-lg font-light text-white text-[12px] tracking-[0.4em] uppercase shadow-2xl transition-all active:scale-[0.98] mt-4">
                    Авторизоваться
                </button>
            </form>

            <div class="mt-12 opacity-10">
                <p class="text-[8px] font-mono tracking-[0.4em] text-white uppercase">Operational Core // Tokyo Design // GDPX v3.8</p>
            </div>
        </div>
    </div>
</div>

<style>
    /* Скрываем интерфейс дашборда на странице логина */
    aside, header, .fixed.top-0 { display: none !important; }
    main { padding: 0 !important; margin: 0 !important; width: 100vw !important; height: 100vh !important; display: flex !important; align-items: center; justify-content: center; background: transparent !important; }
    
    .line-trace { stroke: #c0c0c0; stroke-width: 0.5; stroke-dasharray: 100; animation: trace 1.5s ease-out forwards; }
    .chip-core { fill: none; stroke: var(--japanese-red); opacity: 0; animation: appear 0.5s 1s forwards; stroke-width: 0.5; }
    @keyframes trace { from { stroke-dashoffset: 100; } to { stroke-dashoffset: 0; } }
    @keyframes appear { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
</style>

<script>
    window.addEventListener('load', () => {
        setTimeout(() => {
            const preloader = document.getElementById('preloader');
            preloader.style.opacity = '0';
            setTimeout(() => preloader.style.display = 'none', 1000);
        }, 1500);
    });
</script>
{% endblock %}
