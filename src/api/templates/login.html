{% extends "base.html" %}

{% block title %}GDPX // AUTHORIZATION{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex flex-col justify-center items-center">
    <div class="w-full max-w-md bg-premium p-8 rounded-2xl premium-border sakura-shadow transition-all duration-500">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold tracking-widest text-accent uppercase">Вход в систему</h2>
            <p class="text-gray-500 text-sm mt-2">Введите учетные данные Nexus Control Panel</p>
        </div>

        <form hx-post="/auth/login" 
              hx-target="#error-container" 
              hx-indicator="#loading-spinner"
              class="flex flex-col gap-6">
            
            <div class="flex flex-col gap-2">
                <label class="text-xs font-semibold text-gray-400 uppercase ml-1">Логин</label>
                <input type="text" name="login" required
                       class="bg-black border border-gray-800 rounded-xl px-4 py-3 outline-none focus:border-accent transition-all text-white">
            </div>

            <div class="flex flex-col gap-2" x-data="{ show: false }">
                <label class="text-xs font-semibold text-gray-400 uppercase ml-1">Пароль</label>
                <div class="relative">
                    <input :type="show ? 'text' : 'password'" name="password" required
                           class="w-full bg-black border border-gray-800 rounded-xl px-4 py-3 outline-none focus:border-accent transition-all text-white">
                    <button type="button" @click="show = !show" 
                            class="absolute right-3 top-3 text-gray-500 hover:text-accent transition-colors">
                        <svg x-show="!show" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                        <svg x-show="show" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.05 0 011.563-3.074m9.448-4.854A10 10 0 0112 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-1.274 0-2.454-.21-3.54-.592M9.75 9.75l4.5 4.5m-4.5 0l4.5-4.5M3 3l18 18" />
                        </svg>
                    </button>
                </div>
            </div>

            <div id="error-container"></div>

            <button type="submit" 
                    class="group relative bg-white text-black font-bold py-4 rounded-xl hover:bg-accent transition-all duration-300 uppercase tracking-widest overflow-hidden">
                <span id="loading-spinner" class="htmx-indicator absolute inset-0 flex items-center justify-center bg-accent">
                    <svg class="animate-spin h-5 w-5 text-black" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </span>
                <span>Авторизация</span>
            </button>
        </form>
    </div>
</div>
{% endblock %}
