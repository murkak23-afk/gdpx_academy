{% extends "base.html" %}

{% block title %}GDPX // AUTHORIZATION{% endblock %}

{% block content %}
<div class="fixed inset-0 bg-[#050508] flex flex-col justify-center items-center p-4 z-[100] overflow-hidden">
    
    <!-- Атмосферный фон (Градиенты) -->
    <div class="absolute inset-0 z-0 pointer-events-none select-none">
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_40%,#1e1b4b,transparent)] opacity-60"></div>
        <div class="absolute top-0 left-0 w-full h-full bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] opacity-20"></div>
    </div>

    <!-- Основной контейнер (Modern Premium) -->
    <div class="relative z-10 w-full max-w-[420px] fade-in">
        
        <div class="premium-card p-10 sm:p-12 text-center">
            
            <div class="mb-10">
                <img src="/assets/logo.png" class="w-48 h-auto mx-auto drop-shadow-[0_0_30px_rgba(0,245,255,0.3)]" alt="GDPX">
                <h2 class="text-[28px] font-bold text-white mt-8 tracking-tight neon-text-gradient">Авторизация</h2>
                <p class="text-white/40 text-[11px] uppercase tracking-[0.3em] mt-2">Secure Link Established</p>
            </div>

            <!-- ФОРМА -->
            <form action="/auth/login" method="POST"  class="flex flex-col gap-6">
                
                <div class="space-y-2 text-left">
                    <label class="text-[10px] font-bold text-white/30 uppercase tracking-widest ml-4">Идентификатор</label>
                    <input type="text" name="login" required autocomplete="off"
                           class="w-full bg-white/[0.03] border border-white/10 rounded-2xl px-6 py-4 outline-none focus:border-gdpx-cyan focus:bg-white/[0.05] text-white placeholder:text-white/10 transition-all" 
                           placeholder="USERNAME / ID">
                </div>

                <div class="space-y-2 text-left">
                    <label class="text-[10px] font-bold text-white/30 uppercase tracking-widest ml-4">Пароль</label>
                    <input type="password" name="password" required 
                           class="w-full bg-white/[0.03] border border-white/10 rounded-2xl px-6 py-4 outline-none focus:border-gdpx-sakura focus:bg-white/[0.05] text-white placeholder:text-white/10 transition-all" 
                           placeholder="PASSWORD">
                </div>

                <div id="error-container" class="min-h-[20px]"></div>
                
                <button type="submit" 
                        class="w-full h-[60px] rounded-2xl font-bold text-white text-[14px] tracking-widest uppercase bg-gradient-to-r from-gdpx-cyan to-gdpx-sakura shadow-[0_10px_30px_rgba(0,245,255,0.2)] hover:shadow-[0_15px_40px_rgba(0,245,255,0.4)] transition-all active:scale-[0.98]">
                    Войти в систему
                </button>
            </form>

            <div class="mt-10 opacity-20">
                <p class="text-[9px] font-mono tracking-widest text-white uppercase">NXS.OS v3.0 // HIGH-END OPERATIONAL CORE</p>
            </div>
        </div>
    </div>
</div>

<style>
    /* Скрываем интерфейс дашборда на странице логина */
    aside, header, .cyber-ticker { display: none !important; }
    main { padding: 0 !important; margin: 0 !important; width: 100vw !important; height: 100vh !important; display: flex !important; align-items: center; justify-content: center; background: transparent !important; }
</style>
{% endblock %}
