{% macro inventory_card(category, stock_count) %}
<div class="group bg-white p-6 rounded-[16px] border border-slate-100 shadow-[0_4px_20px_rgba(17,17,17,0.06)] 
            hover:shadow-[0_10px_30px_rgba(0,212,255,0.18)] hover:-translate-y-1 transition-all duration-300 ease-out">
    
    <!-- Заголовок -->
    <div class="flex justify-between items-start mb-6">
        <div class="text-[#00D4FF] group-hover:text-[#C026FF] transition-colors duration-300">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/>
            </svg>
        </div>
        <div class="text-right font-semibold text-[18px] text-[#111111] leading-tight">{{ category.title }}</div>
    </div>

    <!-- Данные -->
    <div class="mb-6">
        <div class="text-[52px] font-semibold tracking-tighter text-[#111111] leading-none">{{ stock_count }}</div>
        <div class="text-[14px] text-[#666666] font-medium mt-1">Доступно</div>
    </div>

    <!-- Инфо-блоки -->
    <div class="space-y-2 mb-6">
        <div class="flex items-center justify-between">
            <span class="text-[13px] text-[#666666]">Цена:</span>
            <span class="text-[15px] font-semibold text-[#00C853]">{{ category.payout_rate }} USDT</span>
        </div>
        <div class="flex items-center justify-between">
            <span class="text-[13px] text-[#666666]">Обновлено:</span>
            <span class="text-[13px] text-[#999]">7 мин назад</span>
        </div>
    </div>

    <!-- Кнопка действия -->
    <button onclick="openModal('{{ category.id }}')" 
            class="w-full h-[52px] rounded-[12px] font-semibold text-white text-[16px] 
                   bg-gradient-to-r from-[#00D4FF] to-[#C026FF] 
                   hover:shadow-[0_0_25px_rgba(0,212,255,0.4)] active:scale-[0.98] transition-all">
        Взять на скан
    </button>
</div>
{% endmacro %}
