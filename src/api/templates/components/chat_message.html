<div class="flex {% if msg.sender_id == current_user_id %}justify-end{% else %}justify-start{% endif %} mb-6 animate-in slide-in-from-bottom-2 duration-500">
    <div class="max-w-[70%] rounded px-8 py-5 transition-all
         {% if msg.sender_id == current_user_id %}
            bg-white/[0.03] border border-white/10 text-white rounded-br-none
         {% else %}
            bg-white/[0.01] border border-white/5 text-white/60 rounded-bl-none
         {% endif %}">
        <div class="text-[14px] font-light leading-relaxed tracking-wide">{{ msg.text }}</div>
        <div class="text-[8px] mt-4 opacity-20 {% if msg.sender_id == current_user_id %}text-right{% else %}text-left{% endif %} font-mono uppercase tracking-widest">
            Broadcast: {{ msg.created_at.strftime('%H:%M') }}
        </div>
    </div>
</div>
