<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GDPX // CONTROL{% endblock %}</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/htmx.org/dist/ext/json-enc.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="/assets/theme.css" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        nexus: {
                            cyan: '#00d9ff',
                            sakura: '#ff00ea',
                            bg: '#0a0a0f',
                            sidebar: 'rgba(10, 10, 15, 0.8)',
                            text: '#ffffff',
                            muted: '#94a3b8',
                            success: '#00C853',
                            error: '#FF3B30'
                        }
                    },
                    fontFamily: { body: ['Outfit', 'sans-serif'] }
                }
            }
        }
    </script>
    
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0a0a0f; color: #ffffff; margin: 0; overflow: hidden; }
        .sidebar-active { 
            background: linear-gradient(90deg, rgba(0, 217, 255, 0.15) 0%, rgba(255, 0, 234, 0.1) 100%);
            border-left: 3px solid #00d9ff;
            color: white; 
        }
        .glass-panel {
            background: rgba(20, 20, 25, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .layout-wrapper { position: relative; z-index: 50; }
    </style>
</head>
<body class="h-screen w-screen relative">

    <!-- PARALLAX BACKGROUND -->
    <div class="fixed inset-0 w-full h-full pointer-events-none z-0 overflow-hidden" id="hero">
        <div class="stars"></div>
        <div class="parallax-layer layer-bg"></div>
        <div class="parallax-layer layer-fg opacity-30"><div class="glowing-orb orb-1"></div></div>
    </div>

    <div class="layout-wrapper flex h-full w-full">
        <!-- Sidebar -->
        <aside class="w-72 glass-panel border-r border-white/10 flex flex-col">
            <div class="p-8">
                <h2 class="text-[10px] font-bold text-nexus-cyan tracking-[0.4em] uppercase opacity-60">Control Panel</h2>
            </div>
            
            <nav class="flex-1 px-4 space-y-1.5">
                {% if user and user.role == 'ADMIN' %}
                <a href="/nexus" class="block py-3 px-4 rounded-xl transition-all {% if active_page == 'dashboard' %}sidebar-active{% else %}text-slate-400 hover:bg-white/5 hover:text-white{% endif %}">Дашборд</a>
                {% endif %}
                <a href="/nexus/inventory" class="block py-3 px-4 rounded-xl transition-all {% if active_page == 'inventory' %}sidebar-active{% else %}text-slate-400 hover:bg-white/5 hover:text-white{% endif %}">Склад</a>
                <a href="/nexus/my-esim" class="block py-3 px-4 rounded-xl transition-all {% if active_page == 'my-esim' %}sidebar-active{% else %}text-slate-400 hover:bg-white/5 hover:text-white{% endif %}">Мои eSIM</a>
                <a href="/nexus/reports" class="block py-3 px-4 rounded-xl transition-all {% if active_page == 'reports' %}sidebar-active{% else %}text-slate-400 hover:bg-white/5 hover:text-white{% endif %}">Статистика</a>
                <a href="/nexus/tickets" class="block py-3 px-4 rounded-xl transition-all {% if active_page == 'tickets' %}sidebar-active{% else %}text-slate-400 hover:bg-white/5 hover:text-white{% endif %}">Support Center</a>
            </nav>

            {% if user %}
            <div class="mt-auto border-t border-white/10 p-6 bg-black/20">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-br from-nexus-cyan to-nexus-sakura p-[1px]">
                        <div class="w-full h-full rounded-full bg-[#0a0a0f] flex items-center justify-center font-bold text-nexus-cyan text-xs">
                            {{ user.username[0]|upper if user.username else 'U' }}
                        </div>
                    </div>
                    <div class="min-w-0">
                        <div class="text-sm font-semibold text-white truncate">@{{ user.username }}</div>
                        <div class="text-[10px] text-nexus-cyan uppercase tracking-widest opacity-70">{{ user.role }}</div>
                    </div>
                    <a href="/auth/logout" class="ml-auto text-white/20 hover:text-nexus-error transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                    </a>
                </div>
            </div>
            {% endif %}
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto p-12">
            <div class="max-w-[1600px] mx-auto">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <script src="/assets/theme.js"></script>
</body>
</html>
