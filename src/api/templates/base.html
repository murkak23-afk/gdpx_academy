<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GDPX // CONTROL{% endblock %}</title>
    
    <!-- Скрипты -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/htmx.org/dist/ext/json-enc.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- Шрифты Parallax Depth -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- Стили Parallax Depth -->
    <link href="/assets/theme.css" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        nexus: {
                            cyan: '#00d9ff',
                            sakura: '#ff00ea',
                            bg: 'transparent',
                            sidebar: 'rgba(10, 10, 15, 0.75)',
                            text: '#ffffff',
                            muted: '#94a3b8'
                        }
                    },
                    fontFamily: {
                        display: ['Orbitron', 'monospace'],
                        heading: ['Space Grotesk', 'sans-serif'],
                        body: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        /* Интеграция Parallax поверх Tailwind */
        body { 
            font-family: 'Inter', sans-serif; 
            background: #0a0a0f; 
            color: #ffffff;
            margin: 0;
            overflow: hidden; /* Prevent body scrolling, handle in main */
        }
        
        .sidebar-active { 
            background: linear-gradient(90deg, rgba(0, 217, 255, 0.2) 0%, rgba(255, 0, 234, 0.2) 100%);
            border-left: 3px solid #00d9ff;
            color: white; 
            box-shadow: inset 10px 0 20px -10px rgba(0, 217, 255, 0.5);
        }

        .glass-panel {
            background: rgba(20, 20, 25, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* Чтобы контент не перекрывался Parallax фоном */
        .layout-wrapper {
            position: relative;
            z-index: 50; /* Выше слоев параллакса */
        }
    </style>
</head>
<body class="h-screen w-screen relative">

    <!-- ==================== PARALLAX BACKGROUND ==================== -->
    <div class="fixed inset-0 w-full h-full pointer-events-none z-0 overflow-hidden" id="hero">
        <!-- Mouse Follower (Hidden) -->
        <div class="mouse-follower" id="mouseFollower" style="display: none !important;"></div>

        <!-- Stars -->
        <div class="stars" id="stars"></div>

        <!-- Grid Overlay -->
        <div class="grid-overlay opacity-30">
            <div class="grid-diagonal-1"></div>
            <div class="grid-diagonal-2"></div>
        </div>
        
        <div class="parallax-layer layer-bg"></div>
        
        <div class="parallax-layer layer-float opacity-50">
            <div class="rectangles-bottom-left">
                <div class="rect rect-bl-1"></div><div class="rect rect-bl-2"></div>
                <div class="rect rect-bl-3"></div><div class="rect rect-bl-4"></div>
            </div>
            <div class="rectangles-top-right">
                <div class="rect rect-tr-1"></div><div class="rect rect-tr-2"></div>
            </div>
        </div>
        
        <div class="parallax-layer layer-fg opacity-40">
            <div class="glowing-orb orb-1"></div>
            <div class="glowing-orb orb-2"></div>
        </div>
    </div>
    <!-- ============================================================= -->

    <!-- Логотип в правом верхнем углу -->
    <div class="fixed top-8 right-8 z-[60] flex items-center gap-4">
        <span class="text-white font-body tracking-wider text-lg font-medium opacity-80 uppercase">Академия GDPX //</span>
        <img src="/assets/logo.png" class="w-32 h-auto opacity-90 hover:opacity-100 transition-opacity drop-shadow-[0_0_20px_rgba(255,0,234,0.6)]" alt="GDPX Logo">
    </div>

    <!-- Layout Wrapper (Sidebar + Main) -->
    <div class="layout-wrapper flex h-full w-full">
        
        <!-- Sidebar -->
        <aside class="w-72 glass-panel border-r border-white/10 flex flex-col">
            <div class="p-8">
                <h2 class="text-xs font-bold text-nexus-cyan font-display tracking-[0.3em] uppercase drop-shadow-[0_0_10px_rgba(0,217,255,0.8)]">Navigation</h2>
            </div>
            
            <nav class="flex-1 px-4 space-y-2">
                {% if user and user.role == 'ADMIN' %}
                <a href="/nexus" class="block py-3 px-4 rounded-xl transition-all {% if active_page == 'dashboard' %}sidebar-active font-semibold{% else %}text-nexus-muted hover:bg-white/5 hover:text-white{% endif %}">Дашборд</a>
                <a href="/nexus/admin" class="block py-3 px-4 rounded-xl transition-all {% if active_page == 'admin' %}sidebar-active font-semibold{% else %}text-nexus-muted hover:bg-white/5 hover:text-white{% endif %}">Управление ботами</a>
                {% endif %}
                
                <a href="/nexus/inventory" class="block py-3 px-4 rounded-xl transition-all {% if active_page == 'inventory' %}sidebar-active font-semibold{% else %}text-nexus-muted hover:bg-white/5 hover:text-white{% endif %}">Склад</a>
                <a href="/nexus/my-esim" class="block py-3 px-4 rounded-xl transition-all {% if active_page == 'my-esim' %}sidebar-active font-semibold{% else %}text-nexus-muted hover:bg-white/5 hover:text-white{% endif %}">Мои eSIM</a>
                <a href="/nexus/reports" class="block py-3 px-4 rounded-xl transition-all {% if active_page == 'reports' %}sidebar-active font-semibold{% else %}text-nexus-muted hover:bg-white/5 hover:text-white{% endif %}">Статистика</a>
                <a href="/nexus/tickets" class="block py-3 px-4 rounded-xl transition-all {% if active_page == 'tickets' %}sidebar-active font-semibold{% else %}text-nexus-muted hover:bg-white/5 hover:text-white{% endif %}">Support Center</a>
            </nav>

            {% if user %}
            <div class="mt-auto border-t border-white/10 p-6">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-nexus-cyan/20 border border-nexus-cyan/50 flex items-center justify-center font-bold text-nexus-cyan font-display drop-shadow-[0_0_8px_rgba(0,217,255,0.8)]">
                        {{ user.username[0]|upper if user.username else 'U' }}
                    </div>
                    <div>
                        <div class="text-sm font-semibold text-white">{{ user.username }}</div>
                        <div class="text-xs text-nexus-cyan">{{ user.role }}</div>
                    </div>
                </div>
            </div>
            {% endif %}
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto p-12">
            <div class="max-w-[1600px] mx-auto">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="/assets/theme.js"></script>
    <!-- Отключаем скролл-анимации параллакса, так как скроллится только <main> -->
    <script>
        // Небольшой фикс, чтобы Parallax скрипт не ругался на отсутствие элементов
        document.body.style.height = '100vh';
    </script>
</body>
</html>
