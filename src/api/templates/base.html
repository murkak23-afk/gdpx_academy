<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GDPX // NEXUS{% endblock %}</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        accent: '#00d2ff',
                        premium: '#111111',
                        sidebar: '#0a0a0a',
                        sakura: '#ffb7c5'
                    }
                }
            }
        }
    </script>

    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #050505; color: #e5e7eb; }
        .sakura-shadow { box-shadow: 0 0 20px rgba(0, 210, 255, 0.05); }
        .sidebar-item-active { background: rgba(0, 210, 255, 0.1); border-right: 3px solid #00d2ff; color: #00d2ff; }
    </style>
</head>
<body class="font-sans antialiased h-screen overflow-hidden flex flex-col md:flex-row" x-data="{ mobileMenu: false }">
    
    <!-- Sidebar (Desktop) / Drawer (Mobile) -->
    <aside :class="mobileMenu ? 'translate-x-0' : '-translate-x-full'" 
           class="fixed inset-y-0 left-0 z-50 w-64 bg-sidebar border-r border-gray-800 transition-transform duration-300 md:relative md:translate-x-0 flex flex-col">
        
        <div class="h-16 flex items-center px-6 border-b border-gray-800">
            <span class="text-accent font-bold text-xl tracking-tighter">❖ GDPX // NEXUS</span>
        </div>

        <nav class="flex-1 py-6 space-y-1">
            <a href="/nexus" class="flex items-center px-6 py-3 text-sm font-medium hover:bg-white/5 transition-colors {% if active_page == 'dashboard' %}sidebar-item-active{% else %}text-gray-400{% endif %}">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                Dashboard
            </a>
            <a href="/nexus/inventory" class="flex items-center px-6 py-3 text-sm font-medium hover:bg-white/5 transition-colors {% if active_page == 'inventory' %}sidebar-item-active{% else %}text-gray-400{% endif %}">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
                Инвентарь
            </a>
            <a href="/nexus/reports" class="flex items-center px-6 py-3 text-sm font-medium hover:bg-white/5 transition-colors {% if active_page == 'reports' %}sidebar-item-active{% else %}text-gray-400{% endif %}">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                Отчеты
            </a>
            <a href="/nexus/tickets" class="flex items-center px-6 py-3 text-sm font-medium hover:bg-white/5 transition-colors {% if active_page == 'tickets' %}sidebar-item-active{% else %}text-gray-400{% endif %}">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
                Чат / Тикеты
            </a>
        </nav>

        <div class="p-4 border-t border-gray-800">
            <div class="bg-premium rounded-xl p-4 flex items-center justify-between">
                <div class="overflow-hidden">
                    <p class="text-xs text-gray-500 uppercase font-bold">Admin</p>
                    <p class="text-sm font-medium truncate">@{{ user.username if user else 'Ghost' }}</p>
                </div>
                <a href="/auth/logout" class="text-gray-500 hover:text-red-400">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                </a>
            </div>
        </div>
    </aside>

    <!-- Content Area -->
    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
        
        <!-- Header (Mobile) -->
        <header class="h-16 bg-sidebar border-b border-gray-800 flex items-center justify-between px-4 md:hidden">
            <button @click="mobileMenu = !mobileMenu" class="text-gray-400">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
            <span class="text-accent font-bold">NEXUS</span>
            <div class="w-6"></div>
        </header>

        <!-- Main Scrollable Content -->
        <main class="flex-1 overflow-y-auto p-4 md:p-8">
            <div class="max-w-[1600px] mx-auto">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <!-- Toast Notifications -->
    <div x-data="{ show: false, message: '' }" 
         x-on:notify.window="show = true; message = $event.detail; setTimeout(() => show = false, 3000)"
         x-show="show" x-cloak x-transition
         class="fixed bottom-5 right-5 z-[100] bg-accent text-black px-6 py-3 rounded-lg shadow-2xl font-bold">
        <span x-text="message"></span>
    </div>

</body>
</html>
