<!DOCTYPE html>
<html lang="ru" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GDPX // CONTROL{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/htmx.org/dist/ext/json-enc.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        nexus: {
                            cyan: '#00D4FF',
                            sakura: '#C026FF',
                            bg: '#FAF9F6',
                            sidebar: '#1C1C1E',
                            text: '#111111',
                            muted: '#666666'
                        }
                    },
                    boxShadow: {
                        'neon': '0 0 15px rgba(0, 212, 255, 0.2)',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .sidebar-active { background: linear-gradient(90deg, #00D4FF 0%, #C026FF 100%); color: white; }
    </style>
</head>
<body class="bg-nexus-bg text-nexus-text h-screen flex">

    <!-- Sidebar -->
    <aside class="w-72 bg-nexus-sidebar text-white flex flex-col p-6">
        <div class="mb-10 px-2">
            <h1 class="text-xl font-bold tracking-tight">GDPX // CONTROL</h1>
        </div>
        
        <nav class="flex-1 space-y-2">
            <!-- Ролевое меню -->
            {% if user and user.role == 'ADMIN' %}
            <a href="/nexus" class="block py-3 px-4 rounded-xl transition-all {% if active_page == 'dashboard' %}sidebar-active font-semibold shadow-neon{% else %}text-slate-400 hover:bg-white/5 hover:text-white{% endif %}">Дашборд</a>
            <a href="/nexus/admin" class="block py-3 px-4 rounded-xl transition-all {% if active_page == 'admin' %}sidebar-active font-semibold shadow-neon{% else %}text-slate-400 hover:bg-white/5 hover:text-white{% endif %}">Управление ботами</a>
            {% endif %}
            
            <a href="/nexus/inventory" class="block py-3 px-4 rounded-xl transition-all {% if active_page == 'inventory' %}sidebar-active font-semibold shadow-neon{% else %}text-slate-400 hover:bg-white/5 hover:text-white{% endif %}">Склад</a>
            <a href="/nexus/my-esim" class="block py-3 px-4 rounded-xl transition-all {% if active_page == 'my-esim' %}sidebar-active font-semibold shadow-neon{% else %}text-slate-400 hover:bg-white/5 hover:text-white{% endif %}">Мои eSIM</a>
            <a href="/nexus/reports" class="block py-3 px-4 rounded-xl transition-all {% if active_page == 'reports' %}sidebar-active font-semibold shadow-neon{% else %}text-slate-400 hover:bg-white/5 hover:text-white{% endif %}">Статистика</a>
        </nav>

        {% if user %}
        <div class="mt-auto border-t border-white/10 pt-6 px-2">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-nexus-cyan/20 flex items-center justify-center font-bold text-nexus-cyan">
                    {{ user.username[0]|upper if user.username else 'U' }}
                </div>
                <div>
                    <div class="text-sm font-semibold">{{ user.username }}</div>
                    <div class="text-xs text-nexus-muted">{{ user.role }}</div>
                </div>
            </div>
        </div>
        {% endif %}
    </aside>

    <!-- Main -->
    <main class="flex-1 overflow-y-auto p-12">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
