<!DOCTYPE html>
<html lang="ru" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GDPX // NEXUS{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #F8FAFC; color: #1E293B; font-family: 'Inter', sans-serif; }
        .glass-panel { 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .sidebar-item-active { background: #00d2ff !important; color: white !important; }
    </style>
</head>
<body class="h-screen overflow-hidden flex">

    <!-- Логотип в правом верхнем углу -->
    <div class="fixed top-8 right-8 z-50">
        <img src="/assets/logo.png" class="w-24 h-auto opacity-90 hover:opacity-100 transition-opacity" alt="GDPX Logo">
    </div>

    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col z-20">
        <div class="p-8">
            <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Navigation</h2>
        </div>
        
        <nav class="flex-1 px-4 space-y-2">
            <a href="/nexus" class="block py-3 px-4 rounded-xl transition-all {% if active_page == 'dashboard' %}sidebar-item-active shadow-lg shadow-blue-500/20{% else %}text-slate-600 hover:bg-slate-100{% endif %}">Dashboard</a>
            <a href="/nexus/inventory" class="block py-3 px-4 rounded-xl transition-all {% if active_page == 'inventory' %}sidebar-item-active shadow-lg{% else %}text-slate-600 hover:bg-slate-100{% endif %}">Inventory</a>
            <a href="/nexus/reports" class="block py-3 px-4 rounded-xl transition-all {% if active_page == 'reports' %}sidebar-item-active shadow-lg{% else %}text-slate-600 hover:bg-slate-100{% endif %}">Reports</a>
            <a href="/nexus/tickets" class="block py-3 px-4 rounded-xl transition-all {% if active_page == 'tickets' %}sidebar-item-active shadow-lg{% else %}text-slate-600 hover:bg-slate-100{% endif %}">Support</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-12">
        <div class="max-w-[1600px] mx-auto">
            {% block content %}{% endblock %}
        </div>
    </main>

</body>
</html>
