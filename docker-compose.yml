services:
  autoheal:
    image: willfarrell/autoheal
    container_name: gdpx_autoheal
    restart: always
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  bot:
    build: .
    container_name: gdpx_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB}
      - WEBHOOK_URL=${WEBHOOK_URL:-https://gdpx.ru/webhook}
      - WEBHOOK_SECRET_TOKEN=${WEBHOOK_SECRET_TOKEN}
    command: /bin/sh -c "alembic upgrade head && python -m src start"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8167/health/ready"]
      interval: 15s
      timeout: 10s
      retries: 3
    volumes:
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    ports:
      # Доступно только для локального Nginx (прокси)
      - "127.0.0.1:8167:8167"
    networks:
      - gdpx_network

  worker:
    build: .
    container_name: gdpx_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB}
    command: python -m src worker
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep '[p]ython -m src worker'"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - gdpx_network

  redis:
    image: redis:7-alpine
    container_name: gdpx_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - ./data/redis:/data
    networks:
      - gdpx_network

  postgres:
    image: postgres:16-alpine
    container_name: gdpx_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gdpx_network

networks:
  gdpx_network:
    driver: bridge
